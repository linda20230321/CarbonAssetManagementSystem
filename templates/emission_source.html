<!-- templates/emission_source.html -->
{% extends "base.html" %}

{% block page_title %}排放源配置{% endblock %}

{% block content %}
<div class="page-container" style="height:100%; display:flex; flex-direction:column;">
    <div class="panel" style="flex:1; display:flex; flex-direction:column; min-height:0;">
        <div class="panel-body" style="flex:1; display:flex; gap:20px; min-height:0; padding:15px;">
            <!-- 左侧树形结构 - 与右侧等高，超出滚动 -->
            <div class="tree-section" style="width:280px; flex-shrink:0; display:flex; flex-direction:column; border-right:1px solid #e1e8ed; padding-right:15px; height:100%; min-height:0;">
                <div class="tree-header" style="display:flex; justify-content:space-between; align-items:center; padding-bottom:10px; border-bottom:1px solid #e1e8ed; flex-shrink:0;">
                    <span class="tree-title" style="font-size:14px; font-weight:bold;">📂 排放分类</span>
                    <div>
                        <button class="btn btn-sm btn-outline" onclick="expandAll()" style="font-size:11px; padding:2px 8px;">展开全部</button>
                        <button class="btn btn-sm btn-outline" onclick="collapseAll()" style="font-size:11px; padding:2px 8px;">折叠全部</button>
                    </div>
                </div>
                <!-- 树容器：flex:1 占满剩余空间，overflow:auto 超出滚动 -->
                <div class="tree-container" id="treeContainer" style="flex:1; overflow:auto; padding-top:8px; min-height:0;">
                    <!-- 树由 JavaScript 动态生成 -->
                </div>
            </div>

            <!-- 右侧表格 -->
            <div class="table-section" style="flex:1; display:flex; flex-direction:column; min-height:0;">
                <div class="table-toolbar" style="display:flex; justify-content:space-between; align-items:center; padding:0 0 10px 0; flex-shrink:0; flex-wrap:wrap; gap:8px;">
                    <div class="btn-group">
                        <button class="btn btn-sm" onclick="selectAll()">全选</button>
                        <button class="btn btn-sm" onclick="deselectAll()">取消全选</button>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-primary btn-sm" onclick="addRecord()">
                            <i class="fas fa-plus"></i> 新增排放源
                        </button>
                        <button class="btn btn-danger btn-sm" onclick="batchDelete()">
                            <i class="fas fa-trash"></i> 批量删除
                        </button>
                        <button class="btn btn-sm" onclick="exportData()">
                            <i class="fas fa-download"></i> 导出数据
                        </button>
                    </div>
                </div>

                <div class="table-wrapper" style="flex:1; overflow:auto; border:1px solid #e1e8ed; border-radius:4px; min-height:0;">
                    <table class="data-table" id="dataTable" style="width:100%; border-collapse:collapse; font-size:13px;">
                        <thead style="position:sticky; top:0; z-index:10; background:#f8f9fa;">
                            <tr>
                                <th width="30"><input type="checkbox" id="selectAllCheckbox" onchange="toggleAllCheckbox()"></th>
                                <th width="50">ID</th>
                                <th width="130">排放范围</th>
                                <th width="150">排放场景</th>
                                <th width="120">排放源类型</th>
                                <th width="180">排放源名称</th>
                                <th width="80">单位</th>
                                <th width="120">活动类别</th>
                                <th width="200">主要能耗设备</th>
                                <th width="100">数据来源</th>
                                <th width="100">操作</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- 数据由 JavaScript 动态渲染 -->
                        </tbody>
                    </table>
                </div>

                <div class="table-footer" style="display:flex; justify-content:space-between; align-items:center; padding:10px 0 0 0; font-size:13px; color:#7f8c8d; flex-shrink:0;">
                    <span id="statusLabel">共 0 条记录 | 已选择 0 项</span>
                    <span id="updateLabel">最后更新: --</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 新增/编辑模态框 -->
<div class="modal" id="formModal" style="display:none;">
    <div class="modal-overlay" onclick="closeModal()"></div>
    <div class="modal-dialog modal-lg">
        <div class="modal-header">
            <h3 id="formTitle">新增排放源</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-body" style="max-height:70vh; overflow-y:auto;">
            <form id="sourceForm">
                <input type="hidden" id="editId" value="">

                <div class="form-group">
                    <label>排放范围 <span class="required">*</span></label>
                    <select id="rangeType" class="form-control" onchange="onRangeChange()">
                        <option value="">请选择排放范围</option>
                        <option value="直接排放（范围1）">直接排放（范围1）</option>
                        <option value="间接排放（范围2）">间接排放（范围2）</option>
                        <option value="其他间接排放（范围3）">其他间接排放（范围3）</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>排放场景 <span class="required">*</span></label>
                    <select id="scenarioType" class="form-control" onchange="onScenarioChange()">
                        <option value="">请先选择排放范围</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>排放源类型 <span class="required">*</span></label>
                    <select id="sourceType" class="form-control" onchange="onSourceTypeChange()">
                        <option value="">请先选择排放场景</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>排放源名称 <span class="required">*</span></label>
                    <input type="text" id="sourceName" class="form-control" placeholder="请输入或选择排放源名称" list="sourceNameList">
                    <datalist id="sourceNameList"></datalist>
                </div>

                <div class="form-group">
                    <label>单位 <span class="required">*</span></label>
                    <select id="unit" class="form-control">
                        <option value="">请选择单位</option>
                        <option value="吨">吨</option>
                        <option value="千克">千克</option>
                        <option value="立方米">立方米</option>
                        <option value="升">升</option>
                        <option value="kWh">kWh</option>
                        <option value="MWh">MWh</option>
                        <option value="GJ">GJ</option>
                        <option value="件">件</option>
                        <option value="次">次</option>
                        <option value="辆">辆</option>
                        <option value="台">台</option>
                        <option value="平方米">平方米</option>
                        <option value="公里">公里</option>
                        <option value="天">天</option>
                        <option value="晚">晚</option>
                        <option value="张">张</option>
                        <option value="月">月</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>活动类别</label>
                    <select id="activityCategory" class="form-control">
                        <option value="">请选择活动类别</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>主要能耗设备</label>
                    <textarea id="equipment" class="form-control" rows="3" placeholder="请输入主要能耗设备"></textarea>
                </div>

                <div class="form-group">
                    <label>数据来源 <span class="required">*</span></label>
                    <select id="dataSource" class="form-control">
                        <option value="">请选择数据来源</option>
                        <option value="自动采集">自动采集</option>
                        <option value="账单">账单</option>
                        <option value="收据">收据</option>
                        <option value="日志记录">日志记录</option>
                        <option value="采购记录">采购记录</option>
                        <option value="估算">估算</option>
                        <option value="EC4T计费">EC4T计费</option>
                        <option value="记录">记录</option>
                    </select>
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button class="btn" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveRecord()">保存</button>
        </div>
    </div>
</div>
