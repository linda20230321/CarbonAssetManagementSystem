<!-- templates/reduction_forecast.html -->
{% extends "base.html" %}

{% block page_title %}碳排放预测{% endblock %}

{% block content %}
<style>
    .forecast-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 16px;
    }
    .forecast-stats .stat-card {
        background: white;
        border-radius: 8px;
        padding: 14px 18px;
        border: 1px solid #e8edf2;
        text-align: center;
    }
    .forecast-stats .stat-card .num {
        font-size: 24px;
        font-weight: bold;
    }
    .forecast-stats .stat-card .lbl {
        font-size: 12px;
        color: #7f8c8d;
    }
    .forecast-chart-area {
        background: white;
        border-radius: 10px;
        padding: 18px 20px;
        border: 1px solid #e8edf2;
        margin-bottom: 16px;
    }
    .forecast-chart-area .chart-title {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 12px;
        color: #2c3e50;
    }
    .forecast-chart-area .chart-container {
        display: flex;
        align-items: flex-end;
        height: 200px;
        gap: 8px;
        padding-top: 10px;
    }
    .forecast-chart-area .bar-item {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        height: 100%;
        justify-content: flex-end;
    }
    .forecast-chart-area .bar-item .bar {
        width: 40px;
        border-radius: 4px 4px 0 0;
        min-height: 4px;
        transition: height 0.6s ease;
        position: relative;
    }
    .forecast-chart-area .bar-item .bar-label {
        font-size: 10px;
        color: #7f8c8d;
        margin-top: 4px;
    }
    .forecast-chart-area .bar-item .bar-value {
        font-size: 10px;
        font-weight: bold;
        color: #2c3e50;
        margin-bottom: 2px;
    }
    .forecast-chart-area .bar-item .bar-target {
        font-size: 9px;
        color: #e74c3c;
        margin-top: 2px;
    }
    .legend {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-top: 10px;
        font-size: 12px;
    }
    .legend-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .legend-item .dot {
        width: 12px;
        height: 12px;
        border-radius: 3px;
    }
</style>

<div class="page-container" style="height:100%; display:flex; flex-direction:column;">

    <!-- 统计 -->
    <div class="forecast-stats">
        <div class="stat-card">
            <div class="num" style="color:#3498db;" id="currentEmission">-</div>
            <div class="lbl">当前排放 (tCO₂e)</div>
        </div>
        <div class="stat-card">
            <div class="num" style="color:#e74c3c;" id="forecastEmission">-</div>
            <div class="lbl">预测排放 (tCO₂e)</div>
        </div>
        <div class="stat-card">
            <div class="num" style="color:#27ae60;" id="targetEmission">-</div>
            <div class="lbl">目标排放 (tCO₂e)</div>
        </div>
        <div class="stat-card">
            <div class="num" style="color:#f39c12;" id="reductionGap">-</div>
            <div class="lbl">减排缺口 (tCO₂e)</div>
        </div>
    </div>

    <!-- 预测图表 -->
    <div class="forecast-chart-area">
        <div class="chart-title">📈 碳排放预测趋势</div>
        <div class="chart-container" id="forecastChart">
            <div style="text-align:center; width:100%; color:#95a5a6; padding:40px 0;">
                ⏳ 加载数据中...
            </div>
        </div>
        <div class="legend">
            <div class="legend-item"><span class="dot" style="background:#3498db;"></span> 历史排放</div>
            <div class="legend-item"><span class="dot" style="background:#e74c3c;"></span> 预测排放</div>
            <div class="legend-item"><span class="dot" style="background:#27ae60;"></span> 目标排放</div>
        </div>
    </div>

    <!-- 预测说明 -->
    <div style="background:white; border-radius:10px; padding:16px 20px; border:1px solid #e8edf2;">
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;">
            <div style="text-align:center; padding:8px; background:#f8f9fa; border-radius:6px;">
                <div style="font-size:20px; font-weight:bold; color:#2c3e50;">FY26</div>
                <div style="font-size:12px; color:#7f8c8d;">预测数据</div>
                <div style="font-size:14px; color:#27ae60; margin-top:4px;">✅ 预计下一年度排放将满足目标计划</div>
            </div>
            <div style="text-align:center; padding:8px; background:#f8f9fa; border-radius:6px;">
                <div style="font-size:20px; font-weight:bold; color:#2c3e50;">目标排放 0</div>
                <div style="font-size:12px; color:#7f8c8d;">碳中和目标</div>
                <div style="font-size:14px; color:#3498db; margin-top:4px;">📊 已发起 4 个 CCER 项目</div>
            </div>
            <div style="text-align:center; padding:8px; background:#f8f9fa; border-radius:6px;">
                <div style="font-size:20px; font-weight:bold; color:#2c3e50;">↓ 12.5%</div>
                <div style="font-size:12px; color:#7f8c8d;">同比减排</div>
                <div style="font-size:14px; color:#27ae60; margin-top:4px;">📈 超低能耗建筑减碳趋势</div>
            </div>
        </div>
    </div>

</div>

<script>
    function loadForecastData() {
        fetch('/api/reduction/forecast')
        .then(function(response) { return response.json(); })
        .then(function(result) {
            if (result.success) {
                var data = result.data;
                renderForecastChart(data.history || [], data.forecasts || []);
                updateStats(data);
            }
        })
        .catch(function(e) {
            console.error('加载预测数据失败:', e);
        });
    }

    function renderForecastChart(history, forecasts) {
        var container = document.getElementById('forecastChart');

        // 合并数据
        var allData = [];
        history.forEach(function(item) {
            allData.push({label: item.month || item.year, value: item.emission, type: 'history'});
        });
        forecasts.forEach(function(item) {
            allData.push({label: item.forecast_year, value: item.forecast_emission, type: 'forecast'});
            if (item.target_emission) {
                allData.push({label: item.forecast_year + '(目标)', value: item.target_emission, type: 'target'});
            }
        });

        if (allData.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#95a5a6; padding:40px 0;">暂无预测数据</div>';
            return;
        }

        var maxVal = Math.max.apply(null, allData.map(function(d) { return d.value || 0; }));
        maxVal = maxVal * 1.2 || 100;

        var colors = {'history': '#3498db', 'forecast': '#e74c3c', 'target': '#27ae60'};
        var labels = {'history': '历史', 'forecast': '预测', 'target': '目标'};

        var html = '';
        allData.forEach(function(item) {
            var height = maxVal > 0 ? (item.value / maxVal * 160) : 10;
            var color = colors[item.type] || '#95a5a6';
            html += '<div class="bar-item">';
            html += '<div class="bar-value">' + (item.value ? item.value.toFixed(0) : '0') + '</div>';
            html += '<div class="bar" style="height:' + Math.max(height, 10) + 'px; background:' + color + '; width:' + (item.type === 'target' ? '30px' : '40px') + ';"></div>';
            html += '<div class="bar-label">' + item.label + '</div>';
            if (item.type === 'target') {
                html += '<div class="bar-target">🎯</div>';
            }
            html += '</div>';
        });

        container.innerHTML = html;
    }

    function updateStats(data) {
        var history = data.history || [];
        var forecasts = data.forecasts || [];

        var current = history.length > 0 ? history[history.length - 1].emission : 0;
        var forecast = forecasts.length > 0 ? forecasts[0].forecast_emission : 0;
        var target = forecasts.length > 0 ? forecasts[0].target_emission : 0;
        var gap = forecast - target;

        document.getElementById('currentEmission').textContent = current ? current.toFixed(0) : '-';
        document.getElementById('forecastEmission').textContent = forecast ? forecast.toFixed(0) : '-';
        document.getElementById('targetEmission').textContent = target ? target.toFixed(0) : '-';
        document.getElementById('reductionGap').textContent = gap ? gap.toFixed(0) : '-';
        document.getElementById('reductionGap').style.color = gap > 0 ? '#e74c3c' : '#27ae60';
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadForecastData();
    });
</script>
{% endblock %}
